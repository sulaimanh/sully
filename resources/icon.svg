<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d2127"/>
      <stop offset="0.55" stop-color="#14171c"/>
      <stop offset="1" stop-color="#0d0f12"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a8b2bd"/>
      <stop offset="0.5" stop-color="#7d8894"/>
      <stop offset="1" stop-color="#59636f"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="0.25" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="squircle">
      <rect x="100" y="100" width="824" height="824" rx="186" ry="186"/>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle)">
    <rect x="100" y="100" width="824" height="824" fill="url(#bg)"/>

    <!-- abstract activity bars, matching the tray mark -->
    <rect x="330" y="422" width="104" height="284" rx="52" fill="url(#bar)"/>
    <rect x="460" y="300" width="104" height="424" rx="52" fill="url(#bar)"/>
    <rect x="590" y="470" width="104" height="140" rx="52" fill="url(#bar)"/>

    <!-- top rim highlight -->
    <rect x="100" y="100" width="824" height="824" rx="186" ry="186"
          fill="none" stroke="url(#rim)" stroke-width="6"/>
  </g>
</svg>
